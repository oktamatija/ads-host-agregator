name: Auto Update Aggregator Lists

on:
  schedule:
    # Menjalankan script setiap hari pada jam 02:00 UTC (09:00 WIB)
    - cron: '0 2 * * *'
  workflow_dispatch: # Mengizinkan eksekusi manual via tombol di GitHub

jobs:
  update-lists:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Scrape & Parse Blocklists
        run: |
          echo "🔄 Memulai penarikan data blocklist..."

          # 1. SCAM & PENIPUAN (Fraud)
          # Sumber: Scam Blocklist oleh durablenapkin (Format Hosts)
          # Mengambil baris yang diawali 0.0.0.0, lalu mengambil kolom kedua (nama domain)
          curl -s "https://raw.githubusercontent.com/durablenapkin/scamblocklist/master/hosts.txt" | \
          grep "^0.0.0.0" | awk '{print $2}' > scam.txt

          # 2. DRUGS (Obat Terlarang) & VIOLENCE (Kekerasan)
          # Karena list spesifik sangat jarang yang terpisah, kita menggunakan 
          # OISD NSFW / StevenBlack extensions sebagai sumber basis, lalu dipisah secara konseptual.
          # Jika Anda memiliki URL mentah spesifik, silakan ganti URL curl di bawah ini.
          
          # Contoh: Menggunakan StevenBlack fakenews sebagai placeholder untuk violence/drugs sementara
          curl -s "https://raw.githubusercontent.com/StevenBlack/hosts/master/alternates/fakenews/hosts" | \
          grep "^0.0.0.0" | awk '{print $2}' > violence.txt

          # Anda bisa menambahkan sumber lain dengan format: curl -s "URL" >> drugs.txt
          touch drugs.txt # Membuat file kosong agar aplikasi tidak error 404

          echo "✅ Pemrosesan data selesai!"

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git add scam.txt violence.txt drugs.txt
          
          # Hanya commit jika ada perubahan data
          git diff --quiet && git diff --staged --quiet || git commit -m "🤖 Auto-update blocklists: $(date +'%Y-%m-%d')"
          
          # Push ke branch main
          git push origin main
