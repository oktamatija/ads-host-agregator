name: Auto Update Aggregator Lists

on:
  schedule:
    # Menjalankan script setiap hari pada jam 02:00 UTC (09:00 WIB)
    - cron: '0 2 * * *'
  workflow_dispatch: # Mengizinkan eksekusi manual via tombol di GitHub

jobs:
  update-lists:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Scrape & Parse All Blocklists
        run: |
          echo "🔄 Memulai penarikan SEMUA data blocklist..."

          # 1. ADS (Iklan & Telemetri Utama) - Menggunakan StevenBlack Base
          curl -s "https://raw.githubusercontent.com/StevenBlack/hosts/master/hosts" | grep "^0.0.0.0" | awk '{print $2}' | grep -v "^0\.0\.0\.0$" > ads.txt

          # 2. ADULT (Konten Dewasa) - StevenBlack Porn
          curl -s "https://raw.githubusercontent.com/StevenBlack/hosts/master/alternates/porn/hosts" | grep "^0.0.0.0" | awk '{print $2}' | grep -v "^0\.0\.0\.0$" > adult.txt

          # 3. GAMBLING (Perjudian) - StevenBlack Gambling
          curl -s "https://raw.githubusercontent.com/StevenBlack/hosts/master/alternates/gambling/hosts" | grep "^0.0.0.0" | awk '{print $2}' | grep -v "^0\.0\.0\.0$" > gambling.txt

          # 4. MALWARE - URLhaus (Sumber otoritatif)
          curl -s "https://urlhaus.abuse.ch/downloads/hostfile/" | grep "^127.0.0.1" | awk '{print $2}' | grep -v "localhost" > malware.txt

          # 5. PHISHING - Phishing Army (Sudah berupa raw domains)
          curl -s "https://phishing.army/download/phishing_army_blocklist.txt" | grep -v "^#" > phishing.txt

          # 6. SCAM (Penipuan) - DurableNapkin
          curl -s "https://raw.githubusercontent.com/durablenapkin/scamblocklist/master/hosts.txt" | grep "^0.0.0.0" | awk '{print $2}' | grep -v "^0\.0\.0\.0$" > scam.txt

          # 7. DRUGS & 8. VIOLENCE
          # Karena file mentah publik sangat jarang yang memisahkan kategori ini secara spesifik, 
          # kita buatkan filenya agar siap diisi manual atau disambung ke sumber lain nanti.
          touch drugs.txt
          touch violence.txt

          echo "✅ Pemrosesan data selesai!"

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Tambahkan semua file teks hasil tarikan
          git add ads.txt adult.txt gambling.txt malware.txt phishing.txt scam.txt drugs.txt violence.txt
          
          # Hanya commit jika ada perubahan data (agar history commit tidak penuh spam jika data sama)
          git diff --quiet && git diff --staged --quiet || git commit -m "🤖 Auto-update blocklists: $(date +'%Y-%m-%d')"
          
          # 🌟 FIX: Tarik pembaruan terbaru dari GitHub sebelum push agar tidak bentrok!
          git pull --rebase origin main
          
          # Push pembaruan ke branch main
          git push origin main
